  <meta name="keywords" content="منح دراسية, منح ممولة, منح تركيا, منح روسيا, منح الصين, EduCore">

<!-- ================= Header ================= -->
<header>
  <h1>EduCore</h1>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="scholarships.html">المنح</a>
  </nav>
</header>

<!-- ================= Hero ================= -->
<section class="hero">
  <h2>تصفح المنح الدراسية حول العالم 🌍</h2>
  <p>
    اختر المنحة المناسبة لك حسب الدولة أو الدرجة العلمية  
    وتواصل معنا مباشرة للتقديم
  </p>
</section>

<section class="filters">
  <input type="text" id="search" placeholder="🔍 ابحث باسم المنحة">

  <select id="filterCountry">
    <option value="all">🌍 كل الدول</option>
    <option value="تركيا">تركيا</option>
    <option value="روسيا">روسيا</option>
    <option value="الصين">الصين</option>
    <option value="ألمانيا">ألمانيا</option>
    <option value="بريطانيا">بريطانيا</option>
    <option value="قطر">قطر</option>
    <option value="رومانيا">رومانيا</option>
    <option value="اليابان">اليابان</option>
    <option value="كندا">كندا</option>
    <option value="المجر">المجر</option>
  </select>
</section>

<!-- ================= Scholarships Cards ================= -->
<section id="cards">
  <!-- Cards generated by main.js -->
</section>

<!-- ================= Details Modal ================= -->
<div id="detailsModal">
  <button id="closeModal">إغلاق</button>
  <div class="modal-box" id="modalContent">
    <!-- Details loaded by JS -->
  </div>
